# Thin caller — Role 3 (QA). Reviews only the Engineering agent's own PRs
# (same-repo branch agent/fix-*), never fork PRs — so pull_request_target's
# privileged token never runs against untrusted head code.
name: Agentic QA

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'agent/fix-')
    uses: lonniev/dpyc-community/.github/workflows/qa.yml@main
    secrets: inherit
    with:
      model: claude-opus-4-8
